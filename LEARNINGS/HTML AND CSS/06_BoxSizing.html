<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Sizing</title>
  <style>
    *{
      margin: 0; /*By Default*/ 
      padding: 0; /*By Default*/
    }
    div{
      height: 400px;
      width: 600px;
      padding: 8px;
      border: 4px solid navy;
      background-color: rgb(255, 164, 194);
      box-sizing: border-box; /* Fix Height and Width ui doesnt expand*/ /*By Default*/
    }
  </style>
</head>
<body>
  <div class="container"></div>
</body>
</html>
