<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .container{
      height: 100vh;
      width: 100vw;
      background-color: beige;
      display: flex;
      flex-direction: row;
      gap: 8px;
      overflow: scroll;
    }

    @media screen and (min-width: 600px){  /* For making the page reponsive.*/
      .container{
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: cadetblue;
        width: 100vw;
      }
    }

    @media screen and (min-width: 800px) {
      .container{
        background-color: chocolate;
      }
    }

    .box{
      height: 110px;
      width: 130px;
      background-color: aqua;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
  </div>
</body>
</html>
