<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="02_Selector.css">

<body>

  <div>
    <h1>Hello dev</h1>
    <p>Lets start studying selectors</p>
    <section>
      <p>CSS Styling</p>
    </section>

  </div>

Types of Selector
1.class (.Common/Shared)
