<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculator</title>
</head>
<body>
  <h1>Calculator</h1>
  <p>
    <label for="firstValue">Enter First Value:</label>
    <input id="firstValue" class="input1" type="number">
  </p>
  <p>
    <label for="secondValue">Enter Second Value:</label>
    <input id="secondValue" class="input2" type="number">
  </p>
  <div class="btn-container">
    <button class="btn-1">+</button>
    <button class="btn-2">-</button>
    <button class="btn-3">X</button>
    <button class="btn-4">/</button>
  </div>
  <p>
    <label for="finalValue">Output:</label> 
    <span class="Output"></span>
  </p>
  <script src="script.js"></script>
</body>
</html>
