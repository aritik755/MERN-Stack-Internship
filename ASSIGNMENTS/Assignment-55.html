<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment-55</title>
</head>
<body>
  <script>
    const divMain = document.createElement('div')
    document.body.appendChild(divMain);
    const h1 = document.createElement('h1');
    h1.textContent = "This is Heading";
    divMain.appendChild(h1);

    const p = document.createElement('p')
    p.textContent = "This is para";
    divMain.appendChild(p);

    const ul = document.createElement('ul');
    divMain.appendChild(ul);
    const arr = ["Asia", "Africa", "Antartica", "Australia"];
    // for(let items of arr){
    //   let liE1 = document.createElement('li');
    //   liE1.textContent = items;
    //   ul.appendChild(liE1);
    // }
    arr.forEach(function(items){
      let liE1 = document.createElement('li');
      liE1.textContent = items;
      ul.appendChild(liE1);
    });

    const divE1 = document.createElement('div');
    divMain.appendChild(divE1);
    let inputE1 = document.createElement('input');
    inputE1.type = "text";
    divE1.appendChild(inputE1);
    let btnE1 = document.createElement('button');
    btnE1.textContent = "Click";
    divE1.appendChild(btnE1);

  </script>
</body>
</html>
