<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question-3</title>
  <style>
    .container{
      position: relative;
      background-color: rgb(199, 45, 45);
      height: 250px;
      width: 500px;
    }

    .rectangle{
      position: absolute;
      background-color: navy;
      height: 125px;
      width: 500px;
      top: 62.5px;
    }

    .circle{
      position: absolute;
      background-color: white;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      top: 12.5px;
      left: 200px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rectangle">
      <div class="circle"></div>
    </div>
  </div>
</body>
</html>
