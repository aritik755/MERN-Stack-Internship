<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question-2</title>
  <style>
    .container{
      position: relative;
      background-color: #2f16b8;
      height: 200px;
      width: 500px;
    }

    .rectangle1{
      background-color: #c49a2c;
      position: absolute;
      height: 80px;
      width: 50px;
      top: 0px;
      left: 75px;
    }

    .rectangle2{
      background-color: #c49a2c;
      position: absolute;
      height: 80px;
      width: 50px;
      bottom: 0px;
      left: 75px;
    }

    .rectangle3{
      background-color: #c49a2c;
      position: absolute;
      height: 40px;
      width: 75px;
      top: 80px;
      left: 0px;
    }

    .rectangle4{
      background-color: #c49a2c;
      position: absolute;
      height: 40px;
      width: 425px;
      top: 80px;
      left: 75px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rectangle1"></div>
    <div class="rectangle2"></div>
    <div class="rectangle3"></div>
    <div class="rectangle4"></div>
  </div>
</body>
</html>
